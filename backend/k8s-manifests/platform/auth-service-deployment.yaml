apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
  namespace: default
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service-container
          image: tianshuvuln/auth-service:3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: AUTH_DB_URL
              value: "jdbc:postgresql://host.minikube.internal:5432/tianshu_auth"
            - name: AUTH_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tianshu-platform-secrets
                  key: db-username
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tianshu-platform-secrets
                  key: db-password
            - name: REDIS_HOST
              value: "host.minikube.internal"
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tianshu-platform-secrets
                  key: jwt-secret
            - name: ZIPKIN_ENDPOINT
              value: "http://host.minikube.internal:9411/api/v2/spans"
