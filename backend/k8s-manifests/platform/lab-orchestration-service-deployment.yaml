# Deploys lab-orchestration-service.
# This service receives launch/terminate requests and creates per-lab Deployment/Service/Ingress resources.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab-orchestration-service-deployment
  namespace: default # Ensure this matches RBAC configurations
  labels:
    app: lab-orchestration-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab-orchestration-service
  template:
    metadata:
      labels:
        app: lab-orchestration-service
    spec:
      serviceAccountName: lab-orchestrator-sa # IMPORTANT: Use the ServiceAccount created above
      containers:
        - name: lab-orchestration-container
          image: tianshuvuln/lab-orchestration-service:3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: VULNERABILITY_DEFINITION_SERVICE_URL
              value: "http://vuln-def-service-svc.default.svc.cluster.local:8081"
            - name: LAB_DB_URL
              value: "jdbc:postgresql://host.minikube.internal:5432/tianshu_lab"
            - name: LAB_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tianshu-platform-secrets
                  key: db-username
            - name: LAB_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tianshu-platform-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tianshu-platform-secrets
                  key: jwt-secret
            - name: ZIPKIN_ENDPOINT
              value: "http://host.minikube.internal:9411/api/v2/spans"
            - name: MINIKUBE_IP_ENV
              value: "192.168.49.2"
